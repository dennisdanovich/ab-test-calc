<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A/B Test Calculator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; color: #1a1a1a; background: #fff; padding: 24px; max-width: 720px; }

  .title { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #111; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }

  .mode-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .mode-btn { flex: 1; padding: 8px 12px; font-size: 13px; border: 1px solid #d0d0d0; border-radius: 6px; background: #fff; color: #555; cursor: pointer; transition: all 0.15s; }
  .mode-btn.active { background: #f0f0f0; color: #111; border-color: #aaa; font-weight: 500; }

  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 10px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .field label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
  .field input { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid #d0d0d0; border-radius: 5px; outline: none; transition: border 0.15s; }
  .field input:focus { border-color: #888; }

  .settings-row { display: flex; gap: 24px; margin-bottom: 20px; align-items: flex-start; }
  .settings-group label { font-size: 12px; color: #555; display: block; margin-bottom: 6px; }
  .toggle-row { display: flex; gap: 6px; }
  .toggle-btn { padding: 5px 12px; font-size: 12px; border: 1px solid #d0d0d0; border-radius: 5px; background: #fff; color: #555; cursor: pointer; }
  .toggle-btn.active { background: #f0f0f0; color: #111; border-color: #aaa; font-weight: 500; }

  .calc-btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 500; border: 1px solid #c0c0c0; border-radius: 6px; background: #f5f5f5; color: #111; cursor: pointer; margin-top: 4px; }
  .calc-btn:hover { background: #ebebeb; }

  .divider { border: none; border-top: 1px solid #e8e8e8; margin: 20px 0; }

  .verdict { border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; border: 1px solid #e0e0e0; }
  .verdict.sig { background: #edfaf3; border-color: #7dd9a8; }
  .verdict.not-sig { background: #fffbec; border-color: #f5d878; }
  .verdict.insuff { background: #f5f5f5; border-color: #ddd; }
  .verdict.danger { background: #fef0f0; border-color: #f5a0a0; }

  .verdict-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .verdict.sig .verdict-label { color: #1a7a47; }
  .verdict.not-sig .verdict-label { color: #8a6800; }
  .verdict.insuff .verdict-label { color: #777; }
  .verdict.danger .verdict-label { color: #c0392b; }
  .verdict-headline { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 6px; }
  .verdict-detail { font-size: 13px; color: #444; line-height: 1.5; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .metric { background: #f7f7f7; border-radius: 6px; padding: 12px 14px; }
  .metric-label { font-size: 11px; color: #777; margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; color: #111; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }

  .impact-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; }
  .impact-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  .impact-row:last-child { border-bottom: none; }
  .impact-row span:first-child { color: #666; }
  .impact-row span:last-child { font-weight: 600; color: #111; }

  .alert { font-size: 12px; border-radius: 5px; padding: 8px 12px; margin-bottom: 10px; }
  .alert.warn { background: #fffbec; color: #7a5c00; border: 1px solid #f5d878; }
  .alert.info { background: #eef5ff; color: #1a4fa0; border: 1px solid #a0c0f5; }

  .stats-toggle { font-size: 12px; color: #888; cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; margin-bottom: 10px; display: block; }
  .stats-box { font-size: 12px; color: #555; background: #f7f7f7; border-radius: 6px; padding: 10px 14px; }
  .stats-row { display: flex; justify-content: space-between; padding: 3px 0; }
  .stats-row span:last-child { font-weight: 500; color: #111; }
  .hidden { display: none; }
  .field-single { margin-bottom: 16px; }
  .field-single label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
  .field-single input { padding: 7px 10px; font-size: 13px; border: 1px solid #d0d0d0; border-radius: 5px; outline: none; max-width: 200px; }
</style>
</head>
<body>

<p class="title">A/B Test Calculator</p>
<p class="subtitle">Plain-English test results & planning with revenue impact. Built for BorrowWorks marketing team.</p>

<div class="mode-row">
  <button class="mode-btn active" id="btn-post" onclick="setMode('post')">Post-test evaluation</button>
  <button class="mode-btn" id="btn-pre" onclick="setMode('pre')">Pre-test planning</button>
</div>

<div id="post-inputs">
  <p class="section-label">Test results</p>
  <div class="grid-2">
    <div class="field"><label>Visitors: Control (A)</label><input type="number" id="va" value="12000" min="1" /></div>
    <div class="field"><label>Visitors: Variant (B)</label><input type="number" id="vb" value="11850" min="1" /></div>
    <div class="field"><label>Conversions: Control (A)</label><input type="number" id="ca" value="360" min="0" /></div>
    <div class="field"><label>Conversions: Variant (B)</label><input type="number" id="cb" value="402" min="0" /></div>
  </div>
  <div class="field-single">
    <label>Revenue per conversion ($)</label>
    <input type="number" id="rev" value="450" min="0" />
  </div>
</div>

<div id="pre-inputs" class="hidden">
  <p class="section-label">Pre-test planning</p>
  <div class="grid-2">
    <div class="field"><label>Daily count (total, both arms)</label><input type="number" id="daily-total" value="1600" min="2" /></div>
    <div class="field"><label>Current conversion rate (%)</label><input type="number" id="base-cr" value="3.0" min="0.01" max="100" step="0.1" /></div>
  </div>
  <div class="grid-2">
    <div class="field"><label>Minimum detectable uplift (%)</label><input type="number" id="mde" value="10" min="1" /></div>
    <div class="field"><label>Revenue per conversion ($) <span style="color:#aaa;font-weight:400;">(optional)</span></label><input type="number" id="rev-pre" value="" placeholder="e.g. 450" min="0" /></div>
  </div>
</div>

<div class="settings-row">
  <div class="settings-group">
    <label>Hypothesis</label>
    <div class="toggle-row">
      <button class="toggle-btn active" id="h-one" onclick="setHyp('one')">One-sided</button>
      <button class="toggle-btn" id="h-two" onclick="setHyp('two')">Two-sided</button>
    </div>
  </div>
  <div class="settings-group">
    <label>Confidence</label>
    <div class="toggle-row">
      <button class="toggle-btn" id="c90" onclick="setConf(90)">90%</button>
      <button class="toggle-btn active" id="c95" onclick="setConf(95)">95%</button>
      <button class="toggle-btn" id="c99" onclick="setConf(99)">99%</button>
    </div>
  </div>
</div>

<button class="calc-btn" onclick="calculate()">Calculate results</button>

<hr class="divider" />

<div id="results"></div>

<script>
let mode = 'post', hyp = 'one', conf = 95;

function setMode(m) {
  mode = m;
  document.getElementById('post-inputs').classList.toggle('hidden', m !== 'post');
  document.getElementById('pre-inputs').classList.toggle('hidden', m !== 'pre');
  document.getElementById('btn-post').classList.toggle('active', m === 'post');
  document.getElementById('btn-pre').classList.toggle('active', m === 'pre');
  document.getElementById('results').innerHTML = '';
}

function setHyp(h) {
  hyp = h;
  document.getElementById('h-one').classList.toggle('active', h === 'one');
  document.getElementById('h-two').classList.toggle('active', h === 'two');
}

function setConf(c) {
  conf = c;
  [90, 95, 99].forEach(v => document.getElementById('c' + v).classList.toggle('active', v === c));
}

function normCDF(z) {
  var t = 1 / (1 + 0.2316419 * Math.abs(z));
  var poly = t * (0.319381530 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
  var pdf = Math.exp(-0.5 * z * z) / Math.sqrt(2 * Math.PI);
  var p = 1 - pdf * poly;
  return z >= 0 ? p : 1 - p;
}

function zCrit(c, sided) {
  var alpha = (100 - c) / 100;
  var a = sided === 'one' ? alpha : alpha / 2;
  var zMap = { 0.1: 1.282, 0.05: 1.645, 0.025: 1.96, 0.005: 2.576 };
  return zMap[a] || 1.96;
}

function calcPower(crA, crB, nA, nB) {
  var se = Math.sqrt(crA * (1 - crA) / nA + crB * (1 - crB) / nB);
  var zc = zCrit(conf, hyp);
  var zStat = (crB - crA) / se;
  var power = 1 - normCDF(zc - Math.abs(zStat)) + normCDF(-zc - Math.abs(zStat));
  return Math.min(Math.max(power, 0), 1);
}

function requiredSampleSize(crA, mdeRel) {
  var crB = crA * (1 + mdeRel / 100);
  var za = hyp === 'one' ? 1.645 : 1.96;
  var zb = 0.842;
  var p_bar = (crA + crB) / 2;
  var n = Math.pow(za * Math.sqrt(2 * p_bar * (1 - p_bar)) + zb * Math.sqrt(crA * (1 - crA) + crB * (1 - crB)), 2) / Math.pow(crB - crA, 2);
  return Math.ceil(n);
}

function toggleStats() {
  var el = document.getElementById('stats-box');
  el.classList.toggle('hidden');
  document.getElementById('stats-toggle').textContent = el.classList.contains('hidden') ? 'Show underlying stats' : 'Hide underlying stats';
}

function fmt(n, dec) { return Number(n).toFixed(dec !== undefined ? dec : 2); }
function fmtPct(n) { return fmt(n * 100, 2) + '%'; }
function fmtDollar(n) { return '$' + Math.round(n).toLocaleString(); }

function calculate() {
  var out = document.getElementById('results');

  if (mode === 'pre') {
    var dailyTotal = parseFloat(document.getElementById('daily-total').value) || 1600;
    var dailyPerArm = dailyTotal / 2;
    var baseCR = parseFloat(document.getElementById('base-cr').value) / 100 || 0.03;
    var mde = parseFloat(document.getElementById('mde').value) || 10;
    var revPre = parseFloat(document.getElementById('rev-pre').value) || 0;

    var n = requiredSampleSize(baseCR, mde);
    var days = Math.ceil(n / dailyPerArm);
    var crB = baseCR * (1 + mde / 100);
    var weeks = (days / 7).toFixed(1);

    // Also compute durations for adjacent MDE scenarios
    var scenarios = [5, 10, 15, 20, 25].map(function(pct) {
      var nS = requiredSampleSize(baseCR, pct);
      var dS = Math.ceil(nS / dailyPerArm);
      return { pct: pct, n: nS, days: dS, weeks: (dS / 7).toFixed(1) };
    });

    var scenarioRows = scenarios.map(function(s) {
      var highlight = s.pct === mde ? ' style="background:#f0f0f0;font-weight:600;"' : '';
      var revCell = '';
      if (revPre > 0) {
        var liftPerDay = (baseCR * (1 + s.pct/100) - baseCR) * dailyTotal;
        var monthlyLiftS = liftPerDay * 30 * revPre;
        revCell = '<td style="text-align:right;padding:6px 10px;">' + fmtDollar(monthlyLiftS) + '/mo</td>';
      }
      return '<tr' + highlight + '>' +
        '<td style="padding:6px 10px;">' + s.pct + '% uplift</td>' +
        '<td style="text-align:right;padding:6px 10px;">' + s.n.toLocaleString() + ' per variant</td>' +
        '<td style="text-align:right;padding:6px 10px;">' + s.days + ' days</td>' +
        '<td style="text-align:right;padding:6px 10px;">' + s.weeks + ' wks</td>' +
        revCell +
      '</tr>';
    }).join('');

    var revHeader = revPre > 0 ? '<th style="text-align:right;padding:6px 10px;">Monthly lift if wins</th>' : '';

    var monthlyLift = (crB - baseCR) * dailyTotal * 30 * revPre;

    var impactSection = '';
    if (revPre > 0) {
      impactSection =
        '<div class="impact-card">' +
          '<p class="section-label" style="margin-bottom:8px;">If the ' + mde + '% uplift materializes</p>' +
          '<div class="impact-row"><span>Monthly revenue lift</span><span>' + fmtDollar(monthlyLift) + '</span></div>' +
          '<div class="impact-row"><span>Annual revenue lift</span><span>' + fmtDollar(monthlyLift * 12) + '</span></div>' +
          '<div class="impact-row"><span>Revenue per conversion</span><span>' + fmtDollar(revPre) + '</span></div>' +
        '</div>';
    }

    out.innerHTML =
      '<div class="verdict insuff">' +
        '<p class="verdict-label">Duration estimate: ' + mde + '% minimum detectable uplift</p>' +
        '<p class="verdict-headline">Run for at least ' + days + ' days (' + weeks + ' weeks)</p>' +
        '<p class="verdict-detail">With ' + dailyTotal.toLocaleString() + ' total count/day split evenly, you need <strong>' + n.toLocaleString() + ' per variant</strong> to detect a ' + mde + '% uplift on a ' + fmtPct(baseCR) + ' baseline at ' + conf + '% confidence.</p>' +
      '</div>' +
      '<div class="metrics">' +
        '<div class="metric"><p class="metric-label">Per-variant count needed</p><p class="metric-value">' + n.toLocaleString() + '</p><p class="metric-sub">to reach significance</p></div>' +
        '<div class="metric"><p class="metric-label">Est. runtime</p><p class="metric-value">' + days + 'd</p><p class="metric-sub">' + weeks + ' weeks</p></div>' +
        '<div class="metric"><p class="metric-label">Baseline CR</p><p class="metric-value">' + fmtPct(baseCR) + '</p><p class="metric-sub">current rate</p></div>' +
        '<div class="metric"><p class="metric-label">Target CR</p><p class="metric-value">' + fmtPct(crB) + '</p><p class="metric-sub">at ' + mde + '% uplift</p></div>' +
      '</div>' +
      '<p class="section-label" style="margin-bottom:8px;">Duration by uplift size</p>' +
      '<div style="border:1px solid #e0e0e0;border-radius:6px;overflow:hidden;margin-bottom:16px;">' +
        '<table style="width:100%;border-collapse:collapse;font-size:13px;">' +
          '<thead><tr style="background:#f7f7f7;color:#888;">' +
            '<th style="text-align:left;padding:6px 10px;font-weight:600;">Uplift detected</th>' +
            '<th style="text-align:right;padding:6px 10px;font-weight:600;">Sample needed</th>' +
            '<th style="text-align:right;padding:6px 10px;font-weight:600;">Days</th>' +
            '<th style="text-align:right;padding:6px 10px;font-weight:600;">Weeks</th>' +
            revHeader +
          '</tr></thead>' +
          '<tbody>' + scenarioRows + '</tbody>' +
        '</table>' +
      '</div>' +
      impactSection;
    return;
  }

  var vA = parseFloat(document.getElementById('va').value);
  var vB = parseFloat(document.getElementById('vb').value);
  var cA = parseFloat(document.getElementById('ca').value);
  var cB = parseFloat(document.getElementById('cb').value);
  var rev = parseFloat(document.getElementById('rev').value) || 0;

  if (!vA || !vB || isNaN(cA) || isNaN(cB)) { out.innerHTML = '<p style="color:#888;font-size:13px;">Please fill in all fields.</p>'; return; }

  var crA = cA / vA;
  var crB = cB / vB;
  var uplift = (crB - crA) / crA;
  var seA = Math.sqrt(crA * (1 - crA) / vA);
  var seB = Math.sqrt(crB * (1 - crB) / vB);
  var seDiff = Math.sqrt(seA * seA + seB * seB);
  var z = (crB - crA) / seDiff;
  var pRaw = hyp === 'one' ? 1 - normCDF(z) : 2 * (1 - normCDF(Math.abs(z)));
  var p = Math.max(Math.min(pRaw, 1), 0);
  var power = calcPower(crA, crB, vA, vB);
  var zcrit = zCrit(conf, hyp);
  var isSig = Math.abs(z) > zcrit;
  var srmAlert = Math.abs(vA / (vA + vB) - 0.5) > 0.03;
  var upliftAbs = crB - crA;
  var monthlyRevLift = upliftAbs * ((vA + vB) / 30) * 30 * rev;

  var verdictClass, verdictLabel, verdictHead, verdictDetail;

  if (srmAlert) {
    verdictClass = 'danger';
    verdictLabel = 'Traffic imbalance detected';
    verdictHead = 'Do not trust this result yet';
    verdictDetail = 'Your traffic split is ' + fmtPct(vA / (vA + vB)) + ' / ' + fmtPct(vB / (vA + vB)) + '. This is significantly off 50/50. This suggests a setup issue (targeting, routing, or tagging). Fix the split before drawing conclusions.';
  } else if (!isSig && power < 0.5) {
    verdictClass = 'insuff';
    verdictLabel = 'Inconclusive: not enough data';
    verdictHead = 'Keep running. Too early to decide.';
    verdictDetail = 'Your test only has ' + fmt(power * 100, 0) + '% power at this sample size. There may be a real effect, but you don\'t have enough data to detect it reliably yet.';
  } else if (!isSig) {
    verdictClass = 'not-sig';
    verdictLabel = 'Not significant at ' + conf + '% confidence';
    verdictHead = uplift > 0 ? 'B looks slightly better, but not conclusively' : 'No meaningful difference detected';
    verdictDetail = 'The observed ' + fmtPct(Math.abs(uplift)) + ' ' + (uplift >= 0 ? 'lift' : 'drop') + ' could be due to chance (p = ' + fmt(p, 3) + '). Do not ship B on this result alone.';
  } else {
    verdictClass = 'sig';
    verdictLabel = 'Significant at ' + conf + '% confidence';
    verdictHead = uplift > 0 ? 'Variation B wins. Ship it.' : 'Variation B underperforms. Do not ship.';
    verdictDetail = uplift > 0
      ? 'B converts ' + fmtPct(Math.abs(uplift)) + ' better than A (' + fmtPct(crA) + ' → ' + fmtPct(crB) + '). This result has ' + fmt(power * 100, 0) + '% power. p = ' + fmt(p, 3) + '.'
      : 'B converts ' + fmtPct(Math.abs(uplift)) + ' worse than A. Stick with the control.';
  }

  var alerts = '';
  if (vA < 100 || vB < 100) alerts += '<div class="alert warn">Low sample size. Results may be unreliable. Aim for at least a few hundred visitors per variant.</div>';
  if (isSig && Math.abs(uplift) < 0.02) alerts += '<div class="alert info">Statistically significant, but the detected uplift (' + fmtPct(Math.abs(uplift)) + ') is very small. Verify it clears your practical threshold before shipping.</div>';

  var impactHTML = '';
  if (rev > 0 && isSig && uplift > 0) {
    impactHTML =
      '<div class="impact-card">' +
        '<p class="section-label" style="margin-bottom:8px;">Revenue impact</p>' +
        '<div class="impact-row"><span>Monthly revenue lift (est.)</span><span>' + fmtDollar(monthlyRevLift) + '</span></div>' +
        '<div class="impact-row"><span>Annual revenue lift (est.)</span><span>' + fmtDollar(monthlyRevLift * 12) + '</span></div>' +
        '<div class="impact-row"><span>Revenue per conversion</span><span>' + fmtDollar(rev) + '</span></div>' +
      '</div>';
  }

  out.innerHTML =
    alerts +
    '<div class="verdict ' + verdictClass + '">' +
      '<p class="verdict-label">' + verdictLabel + '</p>' +
      '<p class="verdict-headline">' + verdictHead + '</p>' +
      '<p class="verdict-detail">' + verdictDetail + '</p>' +
    '</div>' +
    '<div class="metrics">' +
      '<div class="metric"><p class="metric-label">CR: Control (A)</p><p class="metric-value">' + fmtPct(crA) + '</p><p class="metric-sub">' + cA.toLocaleString() + ' / ' + vA.toLocaleString() + '</p></div>' +
      '<div class="metric"><p class="metric-label">CR: Variant (B)</p><p class="metric-value">' + fmtPct(crB) + '</p><p class="metric-sub">' + cB.toLocaleString() + ' / ' + vB.toLocaleString() + '</p></div>' +
      '<div class="metric"><p class="metric-label">Relative uplift</p><p class="metric-value">' + (uplift >= 0 ? '+' : '') + fmtPct(uplift) + '</p><p class="metric-sub">' + (uplift >= 0 ? 'improvement' : 'decline') + '</p></div>' +
      '<div class="metric"><p class="metric-label">Observed power</p><p class="metric-value">' + fmt(power * 100, 0) + '%</p><p class="metric-sub">ability to detect effect</p></div>' +
    '</div>' +
    impactHTML +
    '<button class="stats-toggle" id="stats-toggle" onclick="toggleStats()">Show underlying stats</button>' +
    '<div class="stats-box hidden" id="stats-box">' +
      '<div class="stats-row"><span>Z-score</span><span>' + fmt(z, 4) + '</span></div>' +
      '<div class="stats-row"><span>Critical Z (' + conf + '% ' + hyp + '-sided)</span><span>' + fmt(zcrit, 3) + '</span></div>' +
      '<div class="stats-row"><span>p-value</span><span>' + fmt(p, 4) + '</span></div>' +
      '<div class="stats-row"><span>SE: Control</span><span>' + fmt(seA, 5) + '</span></div>' +
      '<div class="stats-row"><span>SE: Variant</span><span>' + fmt(seB, 5) + '</span></div>' +
      '<div class="stats-row"><span>SE: difference</span><span>' + fmt(seDiff, 5) + '</span></div>' +
    '</div>';
}
</script>
</body>
</html>
